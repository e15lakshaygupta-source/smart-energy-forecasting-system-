<!DOCTYPE html>
<html>

<head>

    <title>Login - Energy Forecasting System</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="login-page">

<div class="login-container">

    <div class="login-card">

        <h1>⚡</h1>

        <h2>Energy Forecasting System</h2>

        <p>
            Smart Energy Prediction & Optimization
        </p>

        <form action="/login" method="POST">

            <label>Username</label>

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >

            <label>Password</label>

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">

                🔐 Login

            </button>

        </form>

        {% if error %}

        <div class="error-box">

            {{ error }}

        </div>

        {% endif %}

        <br>

        <a href="/register" class="register-link">

            Create New Account

        </a>

    </div>

</div>

</body>

</html>
